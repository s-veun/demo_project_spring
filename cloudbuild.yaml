steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/ecommerce-api:$SHORT_SHA', '.']

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ecommerce-api:$SHORT_SHA']

  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ecommerce-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/ecommerce-api:$SHORT_SHA'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--timeout'
      - '300'
      - '--set-env-vars'
      - 'SPRING_PROFILES_ACTIVE=prod,DATABASE_URL=$_DATABASE_URL,CLOUDINARY_CLOUD_NAME=$_CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY=$_CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET=$_CLOUDINARY_API_SECRET,JWT_SECRET=$_JWT_SECRET'
      - '--set-secrets'
      - 'DB_PASSWORD=db-password:latest,DB_USERNAME=db-username:latest'
      - '--allow-unauthenticated'
      - '--add-cloudsql-instances'
      - '$_CLOUD_SQL_INSTANCE'

  # Tag the image as latest
  - name: 'gcr.io/cloud-builders/docker'
    args: ['tag', 'gcr.io/$PROJECT_ID/ecommerce-api:$SHORT_SHA', 'gcr.io/$PROJECT_ID/ecommerce-api:latest']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ecommerce-api:latest']

images:
  - 'gcr.io/$PROJECT_ID/ecommerce-api:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/ecommerce-api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
