# fly.toml app configuration file generated for demo-project-spring-boot on 2026-05-18T11:30:40+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'demo-project-spring-boot'
primary_region = 'sin'

[build]

[env]
  SPRING_PROFILES_ACTIVE = "prod"
  JAVA_OPTS = "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75 -XX:+ExitOnOutOfMemoryError -XX:+UseG1GC"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "4m"
    method = "GET"
    path = "/actuator/health/readiness"

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "4m"
    method = "GET"
    path = "/actuator/health"

[[restart]]
  policy = "on-failure"
  retries = 10

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
