# ────────────────────────────────────────────────────────────────────────────
# Development Profile Configuration (application-dev.properties)
# ────────────────────────────────────────────────────────────────────────────
# Activate with: SPRING_PROFILES_ACTIVE=dev or spring.profiles.active=dev
# ────────────────────────────────────────────────────────────────────────────

# JPA - Allow schema modifications during development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Detailed Logging for Development
logging.level.root=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG
logging.level.com.example.demo_project_spring_boot=DEBUG

# Database Logging
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.springframework.jdbc.datasource=DEBUG
logging.level.org.postgresql=DEBUG
logging.level.org.postgresql.core.v3.ConnectionFactory=DEBUG

# JWT Logging
logging.level.com.example.demo_project_spring_boot.config.JwtAuthenticationFilter=DEBUG
logging.level.com.example.demo_project_spring_boot.service.JwtService=DEBUG

# Health Checks
logging.level.com.example.demo_project_spring_boot.config.DatabaseHealthCheck=DEBUG

# HikariCP - Higher concurrency for development
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Actuator - Show more details in development
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Cache - Disabled for development
spring.cache.type=none
