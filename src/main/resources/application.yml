spring:
  application:
    name: demo_project_spring_boot
  config:
    import: optional:file:.env[.properties],optional:file:./demo_project_spring_boot/.env[.properties]

  # =========================================================
  # DATABASE CONFIGURATION
  # =========================================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=${DB_SSL_MODE:disable}}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  # =========================================================
  # JPA CONFIGURATION
  # =========================================================
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true

    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework

# ===========================================================
# APPLICATION CONFIGURATION
# ===========================================================
app:

  # =========================================================
  # JWT CONFIGURATION
  # =========================================================
  jwt:
    secret: ${JWT_SECRET}

    access-token-expiration: 86400000

    refresh-token-expiration: 604800000

  # =========================================================
  # FRONTEND URL
  # =========================================================
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  oauth2:
    authorized-redirect-uri: ${OAUTH2_AUTHORIZED_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/auth/success}
    allowed-redirect-uris: ${OAUTH2_ALLOWED_REDIRECT_URIS:${OAUTH2_AUTHORIZED_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/auth/success}}

  # =========================================================
  # CORS CONFIGURATION
  # =========================================================
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===========================================================
# SWAGGER CONFIGURATION
# ===========================================================
springdoc:

  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ===========================================================
# LOGGING
# ===========================================================
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG