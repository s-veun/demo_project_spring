spring:
  application:
    name: demo_project_spring_boot

  # =========================================================
  # DATABASE CONFIGURATION
  # =========================================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}}
    username: ${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver

  # =========================================================
  # JPA CONFIGURATION
  # =========================================================
  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

    open-in-view: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - email
              - profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Google
          facebook:
            client-id: ${FACEBOOK_APP_ID:}
            client-secret: ${FACEBOOK_APP_SECRET:}
            scope:
              - email
              - public_profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            client-name: Facebook
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          facebook:
            authorization-uri: https://www.facebook.com/v19.0/dialog/oauth
            token-uri: https://graph.facebook.com/v19.0/oauth/access_token
            user-info-uri: https://graph.facebook.com/me?fields=id,name,email,picture
            user-name-attribute: id

# =========================================================
# SERVER CONFIGURATION
# =========================================================
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  forward-headers-strategy: framework

# ===========================================================
# APPLICATION CONFIGURATION
# ===========================================================
app:

  # =========================================================
  # JWT CONFIGURATION
  # =========================================================
  jwt:
    secret: ${JWT_SECRET}

    access-token-expiration: 86400000

    refresh-token-expiration: 604800000

  # =========================================================
  # FRONTEND URL
  # =========================================================
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

  oauth2:
    authorized-redirect-uri: ${OAUTH2_AUTHORIZED_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/auth/success}
    allowed-redirect-uris: ${OAUTH2_ALLOWED_REDIRECT_URIS:${OAUTH2_AUTHORIZED_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/auth/success}}

  # =========================================================
  # CORS CONFIGURATION
  # =========================================================
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===========================================================
# SWAGGER CONFIGURATION
# ===========================================================
springdoc:

  api-docs:
    enabled: true
    path: /v3/api-docs

  swagger-ui:
    enabled: true
    path: /swagger-ui.html

# ===========================================================
# LOGGING
# ===========================================================
logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG