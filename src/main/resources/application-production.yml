spring:
  config:
    activate:
      on-profile: production
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  shutdown: graceful

management:
  endpoint:
    health:
      show-details: never
      show-components: never

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}

