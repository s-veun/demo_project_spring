spring.application.name=demo_project_spring_boot

# ==========================================================
# SERVER CONFIGURATION
# ==========================================================
server.port=${PORT:8080}
server.address=0.0.0.0

# ✅ Keep API errors user-friendly and avoid leaking stack traces
spring.web.error.include-message=always
spring.web.error.include-exception=false
spring.web.error.include-stacktrace=never

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Saveun2032}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================================
# SECURITY & JWT CONFIGURATION
# ==========================================================
# Railway tip:
# - plain secret: JWT_SECRET_FORMAT=plain
# - openssl base64 secret: JWT_SECRET_FORMAT=base64
# - auto-detection: JWT_SECRET_FORMAT=auto
app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-production-minimum-32-bytes}
app.jwt.secret-format=${JWT_SECRET_FORMAT:plain}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# ==========================================================
# OAUTH2 GOOGLE CONFIGURATION
# ==========================================================
# IMPORTANT:
# - Do not use placeholder values in production, otherwise Google returns 401 invalid_client.
# - GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET must match the OAuth client in Google Cloud Console.
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.client-name=Google
spring.security.oauth2.client.provider.google.authorizationUri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.tokenUri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.userInfoUri=https://www.googleapis.com/oauth2/v1/userinfo
spring.security.oauth2.client.provider.google.userNameAttribute=sub

# ==========================================================
# OAUTH2 FACEBOOK CONFIGURATION
# ==========================================================
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_APP_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_APP_SECRET:}
spring.security.oauth2.client.registration.facebook.scope=public_profile,email
spring.security.oauth2.client.registration.facebook.redirect-uri=${FACEBOOK_REDIRECT_URI:http://localhost:8080/login/oauth2/code/facebook}
spring.security.oauth2.client.registration.facebook.client-name=Facebook
spring.security.oauth2.client.provider.facebook.authorizationUri=https://www.facebook.com/v18.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.tokenUri=https://graph.facebook.com/v18.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.userInfoUri=https://graph.facebook.com/me?fields=id,name,email,picture{url},first_name,last_name
spring.security.oauth2.client.provider.facebook.userNameAttribute=id

# Frontend callback target for success/failure redirects after OAuth2 login.
# Local example: http://localhost:3000/auth/callback
# Railway frontend example: https://your-frontend-domain/auth/callback
app.oauth2.authorized-redirect-uri=${OAUTH2_AUTHORIZED_REDIRECT_URI:http://localhost:3000/auth/callback}

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
cloudinary.cloudName=denxb3y4a
cloudinary.apiKey=836246288911529
cloudinary.apiSecret=Ln8TD2E2x6iRxil-8-PYde3fcOA

# ==========================================================
# FILE UPLOAD
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Banner Upload Configuration
banner.upload.dir=${BANNER_UPLOAD_DIR:uploads/banners}
app.api.url=${APP_API_URL:http://localhost:8080}

# ✅ Serve uploaded files as static resources
spring.web.resources.static-locations=file:uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

# ==========================================================
# SWAGGER / OPENAPI
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.packages-to-scan=com.example.demo_project_spring_boot.controller
springdoc.paths-to-match=/api/**,/actuator/health

# អនុញ្ញាតឱ្យ Swagger ដើរលើ HTTPS (សំខាន់សម្រាប់ Railway)
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# ==========================================================
# LOGGING — ✅ បន្ថែម ដើម្បីឃើញ SpringDoc error
# ==========================================================
logging.level.org.springdoc=DEBUG
logging.level.io.swagger.v3=DEBUG

# ==========================================================
# MISC
# ==========================================================
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.serialization.fail-on-empty-beans=false