spring.application.name=demo_project_spring_boot

# ==========================================================
# SERVER CONFIGURATION
# ==========================================================
server.port=${PORT:8080}
server.address=0.0.0.0

# បង្ហាញ error message ច្បាស់
spring.web.error.include-message=always
spring.web.error.include-exception=true
spring.web.error.include-stacktrace=on_param

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Saveun2032}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ==========================================================
# SECURITY & JWT CONFIGURATION
# ==========================================================
app.jwt.secret=${JWT_SECRET:defaultSecretKeyChangeMe}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:}
cloudinary.apiKey=${CLOUDINARY_API_KEY:}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:}

# ==========================================================
# FILE UPLOAD
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# SWAGGER / OPENAPI
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true

# ✅ បន្ថែម — scan Controllers ត្រឹមត្រូវ
springdoc.packages-to-scan=com.example.demo_project_spring_boot.controller
springdoc.paths-to-match=/api/**,/actuator/health

# ==========================================================
# MISC
# ==========================================================
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.serialization.fail-on-empty-beans=false