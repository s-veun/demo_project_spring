spring.application.name=demo_project_spring_boot

# Railway នឹងផ្តល់ Port ឱ្យដោយស្វ័យប្រវត្តិ តាមរយៈ variable PORT
server.port=${PORT:8088}

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
# កែសម្រួលឱ្យស៊ីគ្នាជាមួយ Railway Variables (DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:Saveun2032}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# លុបចោលរាល់ការកំណត់ GCP ព្រោះយើងប្រើ Railway
spring.cloud.gcp.sql.enabled=false
spring.cloud.gcp.core.enabled=false

# ==========================================================
# SECURITY & JWT CONFIGURATION
# ==========================================================
# ទាញយក JWT_SECRET ពី Railway Variables
app.jwt.secret=${JWT_SECRET:change-this-to-your-secure-random-string}

# កំណត់ CORS (ប្រសិនបើអ្នកមានសរសេរក្នុង WebConfig)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Default Security User (តាមដែលអ្នកចង់បាន)
spring.security.user.name=Saveun
spring.security.user.password=Saveun2032

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:denxb3y4a}
cloudinary.apiKey=${CLOUDINARY_API_KEY:836246288911529}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:Ln8TD2E2x6iRxil-8-PYde3fcOA}

# Multipart setup សម្រាប់រូបភាព
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# SWAGGER / OPENAPI CONFIGURATION
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true

# ផ្សេងៗ
spring.jackson.mapper.accept-case-insensitive-enums=true