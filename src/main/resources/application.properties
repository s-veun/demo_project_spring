spring.application.name=demo_project_spring_boot

# ==========================================================
# SERVER CONFIGURATION
# ==========================================================
server.port=${PORT:8088}
server.address=0.0.0.0

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
# ប្រើតែ DATABASE_URL ពី Railway - វាមាន username/password រួចហើយ!
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
# លុបទាំង 2 បន្ទាត់នេះចោល - មិនត្រូវការទេ!
# spring.datasource.username=${DB_USERNAME:postgres}
# spring.datasource.password=${DB_PASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# លុបចោលរាល់ការកំណត់ GCP
spring.cloud.gcp.sql.enabled=false
spring.cloud.gcp.core.enabled=false

# ==========================================================
# SECURITY & JWT CONFIGURATION
# ==========================================================
app.jwt.secret=${JWT_SECRET}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD}

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME}
cloudinary.apiKey=${CLOUDINARY_API_KEY}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET}

# Multipart setup សម្រាប់រូបភាព
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# SWAGGER / OPENAPI CONFIGURATION
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true

# ==========================================================
# MISC
# ==========================================================
spring.jackson.mapper.accept-case-insensitive-enums=true