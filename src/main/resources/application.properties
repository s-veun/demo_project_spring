spring.application.name=demo_project_spring_boot
spring.config.import=optional:file:.env[.properties],optional:file:./demo_project_spring_boot/.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
spring.profiles.group.railway=prod

# Runtime
spring.main.banner-mode=console
spring.devtools.add-properties=false

# Server
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:25s}
spring.threads.virtual.enabled=${ENABLE_VIRTUAL_THREADS:false}

# Error payloads
spring.web.error.include-message=never
spring.web.error.include-exception=false
spring.web.error.include-stacktrace=never

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:${JDBC_DATABASE_URL:}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DATABASE_USER:${DB_USERNAME:}}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${DB_PASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:5}
spring.datasource.hikari.connection-timeout=${HIKARI_CONN_TIMEOUT:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.register-mbeans=true

# Google login
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email


# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

app.frontend-url=${FRONTEND_BASE_URL:${FRONTEND_URL:}}
app.oauth2.authorized-redirect-uri=${OAUTH2_AUTHORIZED_REDIRECT_URI:}
app.oauth2.allowed-redirect-uris=${OAUTH2_ALLOWED_REDIRECT_URIS:}

# Cloudinary
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:}
cloudinary.apiKey=${CLOUDINARY_API_KEY:}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:}

app.jwt.secret=${JWT_SECRET}
# Canonical property names consumed by JwtService
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:${JWT_EXPIRATION:86400000}}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:${JWT_REFRESH_EXPIRATION:604800000}}
# Legacy aliases (kept for backward-compat, not read by JwtService)
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
banner.upload.dir=${BANNER_UPLOAD_DIR:uploads/banners}
app.profile-image.upload-dir=${PROFILE_IMAGE_UPLOAD_DIR:uploads/profile-images}
app.profile-image.public-base-path=${PROFILE_IMAGE_PUBLIC_BASE_PATH:/uploads/profile-images}
app.profile-image.storage-provider=${PROFILE_IMAGE_STORAGE_PROVIDER:cloudinary}
app.profile-image.cloudinary-folder=${PROFILE_IMAGE_CLOUDINARY_FOLDER:uploads/profile-images}
app.profile-image.default-url=${PROFILE_IMAGE_DEFAULT_URL:/uploads/profile-images/default-avatar.png}
app.profile-image.api-base-url=${APP_API_URL:}
app.profile-image.max-file-size-bytes=${PROFILE_IMAGE_MAX_BYTES:5242880}
app.profile-image.rate-limit.max-requests=${PROFILE_IMAGE_RATE_LIMIT_MAX_REQUESTS:10}
app.profile-image.rate-limit.window-seconds=${PROFILE_IMAGE_RATE_LIMIT_WINDOW_SECONDS:60}
app.api.url=${APP_API_URL:}
spring.web.resources.static-locations=file:uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:${CORS_ALLOWED_ORIGINS:${cors.allowed-origins:http://localhost:3000,http://localhost:3001}}}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packages-to-scan=com.example.demo_project_spring_boot.controller
springdoc.paths-to-match=/api/**,/actuator/health

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:never}
management.health.db.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.info.env.enabled=false

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springdoc=${LOG_LEVEL_SPRINGDOC:INFO}
logging.level.io.swagger.v3=${LOG_LEVEL_SWAGGER:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:INFO}
logging.level.org.springframework.security.oauth2=${LOG_LEVEL_SPRING_SECURITY_OAUTH2:INFO}
# Set LOG_LEVEL_JWT=DEBUG to trace JWT authentication issues
logging.level.com.example.demo_project_spring_boot.config.JwtAuthenticationFilter=${LOG_LEVEL_JWT:DEBUG}
logging.level.com.example.demo_project_spring_boot.controller.CartController=${LOG_LEVEL_CART:DEBUG}

# Database & Connection Pool Logging
logging.level.com.zaxxer.hikari=${LOG_LEVEL_HIKARI:INFO}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:INFO}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:INFO}
logging.level.org.springframework.jdbc.datasource=${LOG_LEVEL_JDBC:INFO}
logging.level.org.postgresql=${LOG_LEVEL_POSTGRES_DRIVER:INFO}

# Database Health Check (custom component)
logging.level.com.example.demo_project_spring_boot.config.DatabaseHealthCheck=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Admin bootstrap (first-run seeding — set all three to create the initial admin account)
# ADMIN_BOOTSTRAP_USERNAME, ADMIN_BOOTSTRAP_EMAIL, ADMIN_BOOTSTRAP_PASSWORD env vars
app.admin.bootstrap.username=${ADMIN_BOOTSTRAP_USERNAME:}
app.admin.bootstrap.email=${ADMIN_BOOTSTRAP_EMAIL:}
app.admin.bootstrap.password=${ADMIN_BOOTSTRAP_PASSWORD:}
app.admin.rate-limit.max-requests=${ADMIN_RATE_LIMIT_MAX_REQUESTS:120}
app.admin.rate-limit.window-seconds=${ADMIN_RATE_LIMIT_WINDOW_SECONDS:60}

# Admin settings module
app.settings.upload.max-file-size-bytes=${SETTINGS_UPLOAD_MAX_BYTES:2097152}
app.settings.upload.allowed-content-types=${SETTINGS_UPLOAD_ALLOWED_TYPES:image/png,image/jpeg,image/svg+xml,image/x-icon,image/vnd.microsoft.icon}
app.settings.upload.cloudinary-folder=${SETTINGS_UPLOAD_CLOUDINARY_FOLDER:settings/assets}

# Cache (simple by default; switch to redis in production with SPRING_CACHE_TYPE=redis)
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:}
management.health.redis.enabled=${MANAGEMENT_HEALTH_REDIS_ENABLED:false}

# Misc
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.serialization.fail-on-empty-beans=false
