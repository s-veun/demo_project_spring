spring.application.name=demo_project_spring_boot

# ==========================================================
# SERVER CONFIGURATION
# ==========================================================
# Railway នឹងផ្តល់ Port ឱ្យដោយស្វ័យប្រវត្តិ តាមរយៈ variable PORT
server.port=${PORT:8088}
# សំខាន់! ត្រូវតែ bind ទៅ 0.0.0.0 សម្រាប់ Railway
server.address=0.0.0.0

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
# Railway Postgres នឹងផ្តល់ DATABASE_URL ដោយស្វ័យប្រវត្តិ
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# លុបចោលរាល់ការកំណត់ GCP ព្រោះយើងប្រើ Railway
spring.cloud.gcp.sql.enabled=false
spring.cloud.gcp.core.enabled=false

# ==========================================================
# SECURITY & JWT CONFIGURATION
# ==========================================================
# ទាញយក JWT_SECRET ពី Railway Variables (កុំដាក់ default value!)
app.jwt.secret=${JWT_SECRET}

# កំណត់ CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Default Security User - ប្រើ environment variables
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD}

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
# ទាញយកពី Railway Variables (កុំ hardcode!)
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME}
cloudinary.apiKey=${CLOUDINARY_API_KEY}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET}

# Multipart setup សម្រាប់រូបភាព
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# SWAGGER / OPENAPI CONFIGURATION
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true

# ==========================================================
# MISC
# ==========================================================
spring.jackson.mapper.accept-case-insensitive-enums=true