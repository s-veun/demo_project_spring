spring.application.name=demo_project_spring_boot

# ==========================================================
# SERVER CONFIGURATION
# ==========================================================
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework

spring.web.error.include-message=always
spring.web.error.include-exception=false
spring.web.error.include-stacktrace=never

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-jwt-secret-in-production-minimum-32-bytes}
app.jwt.secret-format=${JWT_SECRET_FORMAT:plain}
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:86400000}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:604800000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.oauth2.client.servlet.OAuth2ClientAutoConfiguration

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile,openid
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.google.client-name=Google

spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_APP_ID:}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_APP_SECRET:}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.registration.facebook.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.facebook.client-name=Facebook

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v19.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v19.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/me?fields=id,name,email,picture
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.oauth2.authorized-redirect-uri=${OAUTH2_AUTHORIZED_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/auth/success}
app.oauth2.allowed-redirect-uris=${OAUTH2_ALLOWED_REDIRECT_URIS:${OAUTH2_AUTHORIZED_REDIRECT_URI:${FRONTEND_URL:http://localhost:3000}/auth/success}}

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
cloudinary.cloudName=denxb3y4a
cloudinary.apiKey=836246288911529
cloudinary.apiSecret=Ln8TD2E2x6iRxil-8-PYde3fcOA

# ==========================================================
# FILE UPLOAD
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Banner Upload Configuration
banner.upload.dir=${BANNER_UPLOAD_DIR:uploads/banners}
app.api.url=${APP_API_URL:http://localhost:8080}

# ✅ Serve uploaded files as static resources
spring.web.resources.static-locations=file:uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

# ==========================================================
# SWAGGER / OPENAPI
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.packages-to-scan=com.example.demo_project_spring_boot.controller
springdoc.paths-to-match=/api/**,/actuator/health

# ==========================================================
# ACTUATOR HEALTH (for Docker/Compose health checks)
# ==========================================================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.db.enabled=true

# អនុញ្ញាតឱ្យ Swagger ដើរលើ HTTPS (សំខាន់សម្រាប់ Railway)
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs

# ==========================================================
# LOGGING — ✅ បន្ថែម ដើម្បីឃើញ SpringDoc error
# ==========================================================
logging.level.org.springdoc=DEBUG
logging.level.io.swagger.v3=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# ==========================================================
# MISC
# ==========================================================
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.serialization.fail-on-empty-beans=false