spring.application.name=demo_project_spring_boot
spring.config.import=optional:file:.env[.properties],optional:file:./demo_project_spring_boot/.env[.properties]
spring.profiles.active=${SPRING_PROFILES_ACTIVE:default}
spring.profiles.group.railway=prod

# Runtime
spring.main.banner-mode=console
spring.devtools.add-properties=false

# Server
server.port=${PORT:8080}
server.address=0.0.0.0
server.forward-headers-strategy=framework
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=${SHUTDOWN_TIMEOUT:25s}
spring.threads.virtual.enabled=${ENABLE_VIRTUAL_THREADS:false}

# Error payloads
spring.web.error.include-message=never
spring.web.error.include-exception=false
spring.web.error.include-stacktrace=never

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:${JDBC_DATABASE_URL:}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DATABASE_USERNAME:${DB_USERNAME:}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DATABASE_PASSWORD:${DB_PASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Google login
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email


# JPA
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# ── Frontend / OAuth2 redirect configuration ─────────────────────────────────
# Set FRONTEND_URL on Railway (or locally in .env) to your actual frontend URL.
# Example: FRONTEND_URL=https://my-shop.vercel.app
#
# When FRONTEND_URL is set, only URLs under that origin are accepted for OAuth2
# redirects (strict mode).  When it is NOT set, any valid http/https
# frontend_redirect_uri is accepted – convenient for local development but NOT
# recommended for production deployments.
app.frontend-url=${FRONTEND_BASE_URL:${FRONTEND_URL:}}
app.oauth2.authorized-redirect-uri=${OAUTH2_AUTHORIZED_REDIRECT_URI:}
app.oauth2.allowed-redirect-uris=${OAUTH2_ALLOWED_REDIRECT_URIS:}

# Cloudinary
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:}
cloudinary.apiKey=${CLOUDINARY_API_KEY:}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:}

app.jwt.secret=${JWT_SECRET}
# Canonical property names consumed by JwtService
app.jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:${JWT_EXPIRATION:86400000}}
app.jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:${JWT_REFRESH_EXPIRATION:604800000}}
# Legacy aliases (kept for backward-compat, not read by JwtService)
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh.expiration=${JWT_REFRESH_EXPIRATION:604800000}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB
banner.upload.dir=${BANNER_UPLOAD_DIR:uploads/banners}
app.api.url=${APP_API_URL:}
spring.web.resources.static-locations=file:uploads/,classpath:/static/
spring.mvc.static-path-pattern=/uploads/**

# CORS – comma-separated list of allowed origins.
# Extend with your Railway/Vercel frontend URL via the CORS_ALLOWED_ORIGINS env var.
# e.g. CORS_ALLOWED_ORIGINS=https://my-shop.vercel.app,https://admin.my-shop.vercel.app
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.config-url=/v3/api-docs/swagger-config
springdoc.swagger-ui.url=/v3/api-docs
springdoc.packages-to-scan=com.example.demo_project_spring_boot.controller
springdoc.paths-to-match=/api/**,/actuator/health

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=${ACTUATOR_HEALTH_SHOW_DETAILS:never}
management.health.db.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db
management.info.env.enabled=false

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springdoc=${LOG_LEVEL_SPRINGDOC:INFO}
logging.level.io.swagger.v3=${LOG_LEVEL_SWAGGER:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:INFO}
logging.level.org.springframework.security.oauth2=${LOG_LEVEL_SPRING_SECURITY_OAUTH2:INFO}
# Set LOG_LEVEL_JWT=DEBUG to trace JWT authentication issues
logging.level.com.example.demo_project_spring_boot.config.JwtAuthenticationFilter=${LOG_LEVEL_JWT:DEBUG}
logging.level.com.example.demo_project_spring_boot.controller.CartController=${LOG_LEVEL_CART:DEBUG}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Misc
spring.jackson.mapper.accept-case-insensitive-enums=true
spring.jackson.serialization.fail-on-empty-beans=false