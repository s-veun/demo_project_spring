spring.application.name=demo_project_spring_boot

# ==========================================================
# SERVER CONFIGURATION
# ==========================================================
server.port=${PORT:8080}
server.address=0.0.0.0

# ==========================================================
# DATABASE CONFIGURATION
# ==========================================================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Saveun2032}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================================
# SECURITY & JWT CONFIGURATION
# ==========================================================
app.jwt.secret=${JWT_SECRET:defaultSecretKeyChangeMe}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}
spring.security.user.name=${ADMIN_USERNAME:admin}
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# ==========================================================
# CLOUDINARY CONFIGURATION
# ==========================================================
cloudinary.cloudName=${CLOUDINARY_CLOUD_NAME:}
cloudinary.apiKey=${CLOUDINARY_API_KEY:}
cloudinary.apiSecret=${CLOUDINARY_API_SECRET:}

# ==========================================================
# FILE UPLOAD
# ==========================================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# ==========================================================
# SWAGGER / OPENAPI
# ==========================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true

# ==========================================================
# MISC
# ==========================================================
spring.jackson.mapper.accept-case-insensitive-enums=true